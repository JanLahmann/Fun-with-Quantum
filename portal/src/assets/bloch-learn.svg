<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" role="img" aria-label="Bloch sphere with a state vector and a palette of quantum gates">
  <defs>
    <linearGradient id="state" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0E7C9C"/>
      <stop offset="1" stop-color="#C22F6E"/>
    </linearGradient>
  </defs>
  <rect width="640" height="280" fill="#FFFFFF"/>

  <!-- Bloch sphere -->
  <g>
    <circle cx="235" cy="145" r="98" fill="none" stroke="#C9CEDC" stroke-width="2"/>
    <ellipse cx="235" cy="145" rx="98" ry="30" fill="none" stroke="#C9CEDC" stroke-width="1.5" stroke-dasharray="5 5"/>
    <line x1="235" y1="35" x2="235" y2="255" stroke="#C9CEDC" stroke-width="1.5" stroke-dasharray="5 5"/>
    <text x="235" y="26" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="17" fill="#1C1D27">|0&#x27E9;</text>
    <text x="235" y="274" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="17" fill="#1C1D27">|1&#x27E9;</text>
    <text x="345" y="150" font-family="Menlo, Consolas, monospace" font-size="14" fill="#5B5D70">x</text>
    <!-- state vector -->
    <line x1="235" y1="145" x2="298" y2="72" stroke="url(#state)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 298 72 l -14 2 l 8 -13 z" fill="#C22F6E"/>
    <circle cx="235" cy="145" r="4.5" fill="#1C1D27"/>
    <text x="312" y="62" font-family="Menlo, Consolas, monospace" font-size="15" fill="#C22F6E">|&#x03C8;&#x27E9;</text>
  </g>

  <!-- gate palette -->
  <g font-family="Menlo, Consolas, monospace" font-size="19" text-anchor="middle" font-weight="bold">
    <g>
      <rect x="432" y="46" width="44" height="44" rx="8" fill="#0E7C9C"/>
      <text x="454" y="75" fill="#FFFFFF">X</text>
      <rect x="486" y="46" width="44" height="44" rx="8" fill="#0E7C9C"/>
      <text x="508" y="75" fill="#FFFFFF">Y</text>
      <rect x="540" y="46" width="44" height="44" rx="8" fill="#0E7C9C"/>
      <text x="562" y="75" fill="#FFFFFF">Z</text>
    </g>
    <g>
      <rect x="432" y="100" width="44" height="44" rx="8" fill="#C22F6E"/>
      <text x="454" y="129" fill="#FFFFFF">H</text>
      <rect x="486" y="100" width="44" height="44" rx="8" fill="#C22F6E"/>
      <text x="508" y="129" fill="#FFFFFF">S</text>
      <rect x="540" y="100" width="44" height="44" rx="8" fill="#C22F6E"/>
      <text x="562" y="129" fill="#FFFFFF">T</text>
    </g>
    <g>
      <rect x="432" y="154" width="44" height="44" rx="8" fill="none" stroke="#0E7C9C" stroke-width="2"/>
      <text x="454" y="183" fill="#0E7C9C" font-size="15">Rx</text>
      <rect x="486" y="154" width="44" height="44" rx="8" fill="none" stroke="#0E7C9C" stroke-width="2"/>
      <text x="508" y="183" fill="#0E7C9C" font-size="15">Ry</text>
      <rect x="540" y="154" width="44" height="44" rx="8" fill="none" stroke="#C22F6E" stroke-width="2"/>
      <text x="562" y="183" fill="#C22F6E" font-size="15">Rz</text>
    </g>
  </g>
</svg>
